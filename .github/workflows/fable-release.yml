name: Fable Release

# Builds the fable SYCL (Intel Arc / Battlemage) and CUDA Docker images,
# pushes them to GHCR and publishes a GitHub release with the SYCL binary tarball.
#
# Trigger either by pushing a tag starting with "fable-" (e.g. fable-2026-07-07)
# or manually via workflow_dispatch (creates/updates a release named after the
# short commit SHA).

on:
  push:
    tags:
      - 'fable-*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: llama-sycl-fable
  CUDA_IMAGE_NAME: llama-cuda-fable

jobs:
  build:
    name: Build SYCL artifact + Docker image
    runs-on: ubuntu-24.04

    outputs:
      version: ${{ steps.meta.outputs.version }}
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version and image name
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/fable-* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="fable-$(date -u +%Y%m%d)-$(git rev-parse --short HEAD)"
          fi
          REPO_OWNER="${GITHUB_REPOSITORY_OWNER@L}"
          IMAGE="ghcr.io/${REPO_OWNER}/${IMAGE_NAME}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Get build date
        id: build_date
        run: echo "date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Free Disk Space (Ubuntu)
        uses: ggml-org/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devops/fable-sycl.Dockerfile
          target: server
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
          build-args: |
            BUILD_DATE=${{ steps.build_date.outputs.date }}
            APP_VERSION=${{ steps.meta.outputs.version }}
            APP_REVISION=${{ github.sha }}
            IMAGE_URL=${{ github.server_url }}/${{ github.repository }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache,mode=max

      - name: Export binaries from build (artifact target)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devops/fable-sycl.Dockerfile
          target: artifact
          platforms: linux/amd64
          outputs: type=local,dest=out
          build-args: |
            BUILD_DATE=${{ steps.build_date.outputs.date }}
            APP_VERSION=${{ steps.meta.outputs.version }}
            APP_REVISION=${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache

      - name: Pack artifact tarball
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          STAGE="llama-${VERSION}-sycl-linux-x64"
          mkdir -p "${STAGE}"
          cp -r out/bin "${STAGE}/bin"
          cp -r out/lib "${STAGE}/lib"
          cat > "${STAGE}/README.txt" <<EOF
          llama.cpp fable-sycl build ${VERSION} (commit ${GITHUB_SHA})

          SYCL build for Intel Arc / Battlemage GPUs (icx/icpx, F16, oneDNN FA).
          Requires the Intel oneAPI runtime and Level Zero / compute-runtime on
          the host. Run with:
            LD_LIBRARY_PATH=\$(pwd)/lib:\$LD_LIBRARY_PATH ./bin/llama-server ...

          Docker image: ${{ steps.meta.outputs.image }}:${VERSION}
          EOF
          tar -czf "${STAGE}.tar.gz" "${STAGE}"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
          echo "TARBALL=${STAGE}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-fable-sycl-linux-x64
          path: |
            ${{ env.TARBALL }}
            ${{ env.TARBALL }}.sha256
          if-no-files-found: error

  build-cuda:
    name: Build CUDA Docker image
    runs-on: ubuntu-24.04

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version and image name
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/fable-* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="fable-$(date -u +%Y%m%d)-$(git rev-parse --short HEAD)"
          fi
          REPO_OWNER="${GITHUB_REPOSITORY_OWNER@L}"
          IMAGE="ghcr.io/${REPO_OWNER}/${CUDA_IMAGE_NAME}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Get build date
        id: build_date
        run: echo "date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Free Disk Space (Ubuntu)
        uses: ggml-org/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devops/cuda.Dockerfile
          target: server
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
          build-args: |
            BUILD_DATE=${{ steps.build_date.outputs.date }}
            APP_VERSION=${{ steps.meta.outputs.version }}
            APP_REVISION=${{ github.sha }}
            IMAGE_URL=${{ github.server_url }}/${{ github.repository }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache,mode=max

  release:
    name: Create GitHub release
    needs: [build, build-cuda]
    runs-on: ubuntu-24.04

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: llama-fable-sycl-linux-x64
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: ${{ needs.build.outputs.version }}
          files: dist/*
          body: |
            fable build `${{ needs.build.outputs.version }}` (commit `${{ github.sha }}`).

            llama.cpp with fable optimizations on top of upstream master:
            Ornith/MoE fused SYCL path, Gemma flash-attention GQA-8 tile kernel,
            oneDNN XMX flash attention, TurboQuant/RotorQuant KV cache types
            (tbq3_0/tbq4_0/planar3_0/iso3_0/planar4_0/iso4_0), DSpark speculative
            decoding. See the README section "Fable fork changes" for details.

            **SYCL Docker image (Intel Arc / Battlemage):**
            ```
            docker pull ${{ needs.build.outputs.image }}:${{ needs.build.outputs.version }}
            ```

            **CUDA Docker image (NVIDIA):**
            ```
            docker pull ${{ needs.build-cuda.outputs.image }}:${{ needs.build.outputs.version }}
            ```

            **SYCL binary tarball:** `llama-${{ needs.build.outputs.version }}-sycl-linux-x64.tar.gz`
            (needs Intel oneAPI runtime + Level Zero on the host; see README.txt inside).
